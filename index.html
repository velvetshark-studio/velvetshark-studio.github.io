<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Shark Studio | Cyber Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=DotGothic16&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #2D1B4D;
            --lavender: #E6E6FA;
            --pastel-pink: #FFD1DC;
            --soft-blue: #AEC6CF;
            --cream: #FFFDD0;
            --glass: rgba(255, 255, 255, 0.12);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
            font-family: 'Poppins', sans-serif;
            background: #1a0b2e;
            background: radial-gradient(circle at center, #2e0052 0%, var(--deep-purple) 100%);
            color: var(--cream);
            display: flex;
            flex-direction: column;
        }

        #canvas-web {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0.8;
            pointer-events: none;
        }

        /* --- STRENGTHENED HEADER --- */
        header {
            flex: 0 0 auto; /* DO NOT SHRINK, DO NOT GROW */
            width: 100%;
            padding: 3vh 0; 
            text-align: center;
            background: rgba(45, 27, 77, 0.4);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        h1 { 
            font-family: 'DotGothic16', sans-serif;
            font-size: clamp(2rem, 8vh, 3.2rem); /* Increased minimum size */
            letter-spacing: 4px;
            color: var(--pastel-pink);
            margin: 0; 
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 15px var(--lavender);
        }

        .tagline { font-style: italic; color: var(--soft-blue); margin-top: 1vh; font-size: clamp(0.8rem, 2.2vh, 1rem); }

        .nav { margin-top: 2vh; display: flex; justify-content: center; gap: 20px; }
        .nav a { 
            color: var(--cream); 
            text-decoration: none; 
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(0.85rem, 2vh, 1.1rem);
            transition: 0.3s;
        }

        .nav a.active { color: var(--pastel-pink); border-bottom: 2px solid var(--pastel-pink); }

        /* --- MAIN CONTENT AREA --- */
        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2vh;
            z-index: 10;
            min-height: 0; /* Important for flex child scrolling/containment */
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 4vh 2.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 800px;
            width: 100%;
            max-height: 90%; /* Keeps card within the flex area */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 { font-size: clamp(1.4rem, 4vh, 2.2rem); margin-bottom: 1.5vh; margin-top: 0; color: var(--lavender); }
        p { font-size: clamp(0.9rem, 2.2vh, 1.1rem); margin-bottom: 2.5vh; line-height: 1.5; }

        .terminal {
            background: #121212;
            font-family: 'JetBrains Mono', monospace;
            padding: 2.5vh;
            border-radius: 12px;
            color: #00ff00;
            border-left: 4px solid var(--pastel-pink);
            line-height: 1.6;
            font-size: clamp(0.75rem, 1.9vh, 1rem);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            word-break: break-all;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background: #00ff00;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        @media (max-width: 600px) {
            header { padding: 4vh 0; }
            .card { padding: 3vh 1.5rem; width: 95%; }
            .nav { gap: 10px; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-web"></canvas>

    <header>
        <h1>VELVET SHARK STUDIO</h1>
        <div class="tagline">Soft enough to adapt. Sharp enough to win.</div>
        <div class="nav">
            <a href="index.html" class="active">Home</a>
            <a href="blog.html">Blog</a>
            <a href="projects.html">Projects</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="card">
            <h2>System Initialized 🦈</h2>
            <p>I’m a security researcher who believes a well-built exploit is just as much an art form as a well-placed pixel.</p>
            <div class="terminal">
                $ whoami <br>
                > velvetshark<br>
                $ status <br>
                > building_something_awesome...<span class="cursor"></span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-web');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const colors = ['#E6E6FA', '#FFD1DC', '#AEC6CF']; 

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2; 
                this.speedY = Math.random() * 0.4 - 0.2;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            let particleCount = window.innerWidth < 600 ? 40 : 80;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                for (let j = index + 1; j < particles.length; j++) {
                    const dx = p.x - particles[j].x;
                    const dy = p.y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) { 
                        ctx.strokeStyle = p.color;
                        ctx.lineWidth = 0.3;
                        ctx.globalAlpha = 1 - (dist / 120);
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
