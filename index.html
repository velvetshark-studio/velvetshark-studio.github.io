<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Shark Studio | Cyber Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=DotGothic16&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #2D1B4D;
            --lavender: #E6E6FA;
            --pastel-pink: #FFD1DC;
            --soft-blue: #AEC6CF;
            --cream: #FFFDD0;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #350060 0%, var(--deep-purple) 100%);
            color: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- RESTORED MATRIX BACKGROUND --- */
        #canvas-web {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            opacity: 0.8; 
            filter: saturate(1.5) brightness(1.2);
            pointer-events: none;
        }

        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        h1 { 
            font-family: 'DotGothic16', sans-serif;
            font-size: 3.2rem;
            letter-spacing: 6px;
            color: var(--pastel-pink);
            margin: 0; 
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 15px var(--lavender);
        }

        h1::before, h1::after {
            content: "VELVET SHARK STUDIO";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        h1::before {
            color: #00fff9;
            z-index: -1;
            animation: glitch-drift 0.9s infinite alternate-reverse;
            clip-path: inset(10% 0 80% 0);
        }

        h1::after {
            color: #ff00c1;
            z-index: -1;
            animation: glitch-drift 1.1s infinite alternate;
            clip-path: inset(80% 0 5% 0);
        }

        @keyframes glitch-drift {
            0% { transform: translate(3px, -2px); clip-path: inset(10% 0 70% 0); }
            20% { transform: translate(-3px, 2px); clip-path: inset(40% 0 20% 0); }
            40% { transform: translate(2px, -2px); clip-path: inset(60% 0 35% 0); }
            60% { transform: translate(-2px, 3px); clip-path: inset(80% 0 5% 0); }
            100% { transform: translate(3px, -1px); clip-path: inset(0% 0 90% 0); }
        }

        .tagline { font-style: italic; color: var(--soft-blue); margin-top: 10px; padding: 0 15px; }

        .nav { margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; }
        .nav a { 
            color: var(--cream); 
            text-decoration: none; 
            margin: 5px 15px; 
            font-family: 'JetBrains Mono', monospace;
            transition: 0.3s;
        }

        .nav a.active {
            color: var(--pastel-pink);
            border-bottom: 2px solid var(--pastel-pink);
        }

        .container {
            max-width: 900px;
            padding: 2rem;
            width: 90%;
            margin-top: 2rem;
            box-sizing: border-box;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .terminal {
            background: #1a1a1a;
            font-family: 'JetBrains Mono', monospace;
            padding: 1.5rem;
            border-radius: 10px;
            color: #00ff00;
            border-left: 4px solid var(--pastel-pink);
            margin-top: 1.5rem;
            line-height: 1.6;
            text-align: left;
            overflow: hidden;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: #00ff00;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; letter-spacing: 2px; }
            .container { width: 100%; padding: 1rem; }
            .card { padding: 1.5rem; }
            .terminal { font-size: 0.75rem; padding: 1rem; word-break: break-all; }
            .nav a { margin: 5px 8px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-web"></canvas>

    <header>
        <h1>VELVET SHARK STUDIO</h1>
        <div class="tagline">Soft enough to adapt. Sharp enough to win.</div>
        <div class="nav">
            <a href="index.html" class="active">Home</a>
            <a href="blog.html">Blog</a>
            <a href="projects.html">Projects</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h2 style="color: var(--lavender); margin-top: 0;">System Initialized 🦈</h2>
            <p>I’m a security researcher who believes a well-built exploit is just as much an art form as a well-placed pixel.</p>
            <div class="terminal">
                $ whoami <br>
                > velvetshark <br>
                $ status <br>
                > building_something_awesome...<span class="cursor"></span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-web');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const colors = ['#E6E6FA', '#FFD1DC', '#AEC6CF']; 

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.4 - 0.2; 
                this.speedY = Math.random() * 0.4 - 0.2;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function init() {
            particles = [];
            const count = window.innerWidth < 600 ? 50 : 100;
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                for (let j = index + 1; j < particles.length; j++) {
                    const dx = p.x - particles[j].x;
                    const dy = p.y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.strokeStyle = p.color;
                        ctx.lineWidth = 0.3;
                        ctx.globalAlpha = 1 - (dist / 150);
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
