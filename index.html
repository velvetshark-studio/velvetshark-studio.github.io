<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Shark Studio | Cyber Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=DotGothic16&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #2D1B4D;
            --lavender: #E6E6FA;
            --pastel-pink: #FFD1DC;
            --soft-blue: #AEC6CF;
            --cream: #FFFDD0;
            --glass: rgba(255, 255, 255, 0.1);
            --highlight-orange: #FF5A2E; /* The orange from your reference image */
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--deep-purple), #4B0082);
            color: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 2rem;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* --- PERMANENT GLITCH TITLE (NO RED) --- */
        h1 { 
            font-family: 'DotGothic16', sans-serif;
            font-weight: normal;
            font-size: 3.2rem;
            letter-spacing: 6px;
            color: var(--pastel-pink);
            margin: 0; 
            text-transform: uppercase;
            position: relative;
            text-shadow: 0 0 15px var(--lavender);
            /* Constant soft flicker */
            animation: text-flicker 4s infinite;
        }

        /* Glitch layers: Always active and no red */
        h1::before, h1::after {
            content: "VELVET SHARK STUDIO";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.7;
            filter: blur(0.5px);
        }

        h1::before {
            color: #00fff9; /* Cyan glitch layer */
            z-index: -1;
            animation: glitch-drift 0.9s infinite alternate-reverse;
        }

        h1::after {
            color: #ff00c1; /* Magenta glitch layer */
            z-index: -1;
            animation: glitch-drift 1.1s infinite alternate;
        }

        /* Subtle flicker that blips to orange briefly */
        @keyframes text-flicker {
            0%, 92%, 94%, 99%, 100% { opacity: 1; color: var(--pastel-pink); }
            93% { opacity: 0.8; color: var(--highlight-orange); }
        }

        /* The blocky distortion effect */
        @keyframes glitch-drift {
            0% { transform: translate(2px, -1px); clip-path: inset(10% 0 80% 0); }
            20% { transform: translate(-2px, 1px); clip-path: inset(30% 0 20% 0); }
            40% { transform: translate(1px, -1px); clip-path: inset(50% 0 45% 0); }
            60% { transform: translate(-1px, 2px); clip-path: inset(80% 0 5% 0); }
            80% { transform: translate(2px, 1px); clip-path: inset(20% 0 60% 0); }
            100% { transform: translate(-2px, -1px); clip-path: inset(0% 0 90% 0); }
        }

        .tagline { font-style: italic; color: var(--soft-blue); margin-top: 5px; }

        .container {
            max-width: 900px;
            padding: 2rem;
            width: 90%;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .terminal {
            background: #1a1a1a;
            font-family: 'JetBrains Mono', monospace;
            padding: 1rem;
            border-radius: 10px;
            color: #00ff00;
            font-size: 0.9rem;
            border-left: 4px solid var(--pastel-pink);
        }

        .nav a { 
            color: var(--cream); 
            text-decoration: none; 
            margin: 0 15px; 
            font-family: 'JetBrains Mono', monospace;
            transition: 0.3s;
        }

        .nav a.active {
        color: var(--pastel-pink);
        border-bottom: 2px solid var(--pastel-pink);
        text-shadow: 0 0 10px var(--pastel-pink), 0 0 20px var(--lavender);
    }
        
        .nav a:hover { color: var(--pastel-pink); text-shadow: 0 0 10px var(--pastel-pink); }
    </style>
</head>
<body>

    <header>
        <h1>VELVET SHARK STUDIO</h1>
        <div class="tagline">Soft enough to adapt. Sharp enough to win.</div>
        <div class="nav">
            <a href="index.html" class="active">Home</a>
            <a href="blog.html">Blog</a>
            <a href="projects.html">Projects</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </header>

    <div class="container">
        <div class="card" style="padding: 2rem;">
            <h2 style="color: var(--lavender);">System Initialized 🦈</h2>
            <p>Your environment is now running with the permanent digital glitch aesthetic.</p>
            <div class="terminal">
                $ whoami <br>
                > velvetshark <br>
                $ status <br>
                > building_something_awesome...
            </div>
        </div>
    </div>

</body>
</html>
