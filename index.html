<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Shark Studio | Cyber Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=DotGothic16&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #2D1B4D;
            --lavender: #E6E6FA;
            --pastel-pink: #FFD1DC;
            --soft-blue: #AEC6CF;
            --cream: #FFFDD0;
            --glass: rgba(255, 255, 255, 0.12);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #2e0052 0%, var(--deep-purple) 100%);
            color: var(--cream);
            display: flex;
            flex-direction: column;
        }

        #canvas-web {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0.8;
            pointer-events: none;
        }

        /* --- HEADER: LARGER, FIXED --- */
        header {
            flex: 0 0 auto;
            width: 100%;
            min-height: 20vh; /* Fixed substantial presence */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(45, 27, 77, 0.4);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }

        h1 { 
            font-family: 'DotGothic16', sans-serif;
            font-size: clamp(2.2rem, 9.5vh, 4rem); /* Large scaling */
            letter-spacing: 5px;
            color: var(--pastel-pink);
            margin: 0; 
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--lavender);
        }

        .tagline { 
            font-style: italic; 
            color: var(--soft-blue); 
            margin-top: 1.2vh; 
            font-size: clamp(0.95rem, 2.6vh, 1.25rem); 
        }

        .nav { 
            margin-top: 2.8vh; 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
        }
        
        .nav a { 
            color: var(--cream); 
            text-decoration: none; 
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(0.9rem, 2.3vh, 1.2rem);
            transition: 0.3s;
            opacity: 0.8;
        }

        .nav a.active { 
            color: var(--pastel-pink); 
            border-bottom: 2px solid var(--pastel-pink); 
            opacity: 1;
        }

        /* --- MAIN WRAPPER: NARROWER, TALLER CONTENT --- */
        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3vh;
            z-index: 10;
            min-height: 0;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 6vh 3rem; /* Increased vertical padding */
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 800px; /* FIXED WIDTH RESET */
            width: 100%;
            max-height: 85%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 { 
            font-size: clamp(1.8rem, 5vh, 2.8rem); /* Bolder scaling */
            margin-bottom: 2.5vh; 
            margin-top: 0; 
            color: var(--lavender); 
        }

        p { 
            font-size: clamp(1rem, 2.5vh, 1.3rem); /* Substantially larger text */
            margin-bottom: 3.5vh; 
            line-height: 1.7; /* Increased spacing */
            opacity: 0.9;
        }

        .terminal {
            background: #121212;
            font-family: 'JetBrains Mono', monospace;
            padding: 3.5vh; /* Increased interior padding */
            border-radius: 14px;
            color: #00ff00;
            border-left: 5px solid var(--pastel-pink);
            line-height: 1.8; /* Tall terminal spacing */
            font-size: clamp(0.9rem, 2.1vh, 1.15rem); /* Scaled font */
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background: #00ff00;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* MOBILE FIX: Resolves overlap and scaling issues */
@media (max-width: 600px) {
    header { 
        min-height: auto; /* Allows header to size to content */
        padding: 20px 0; 
    }
    
    h1 { 
        font-size: 1.8rem; /* Prevents title from being too massive */
        letter-spacing: 2px; 
    }

    .main-wrapper {
        padding: 10px;
        align-items: flex-start; /* Prevents centering clash on short screens */
    }

    .card { 
        padding: 20px 1.5rem; 
        width: 90%; 
        max-height: none; /* Allows card to breathe */
    }

    .nav { 
        flex-wrap: wrap; /* Prevents nav links from jumping out of bounds */
        gap: 10px; 
        padding: 0 10px;
    }
}
    </style>
</head>
<body>

    <canvas id="canvas-web"></canvas>

    <header>
        <h1>VELVET SHARK STUDIO</h1>
        <div class="tagline">Soft enough to adapt. Sharp enough to win.</div>
        <div class="nav">
            <a href="index.html" class="active">Home</a>
            <a href="blog.html">Blog</a>
            <a href="projects.html">Projects</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="card">
            <h2>System Initialized 🦈</h2>
            <p>I’m a security researcher who believes a well-built exploit is just as much an art form as a well-placed pixel.</p>
            <div class="terminal">
                $ whoami <br>
                > velvetshark<br>
                $ status <br>
                > building_something_awesome...<span class="cursor"></span>
            </div>
        </div>
    </div>

    <script>
        // ... (Pulse script stays exactly the same as previous) ...
        const canvas = document.getElementById('canvas-web');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const colors = ['#E6E6FA', '#FFD1DC', '#AEC6CF']; 

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25; 
                this.speedY = Math.random() * 0.5 - 0.25;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            let particleCount = window.innerWidth < 600 ? 50 : 100;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                for (let j = index + 1; j < particles.length; j++) {
                    const dx = p.x - particles[j].x;
                    const dy = p.y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) { 
                        ctx.strokeStyle = p.color;
                        ctx.lineWidth = 0.4;
                        ctx.globalAlpha = 1 - (dist / 150);
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
