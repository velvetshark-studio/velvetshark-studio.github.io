<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Velvet Shark Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=DotGothic16&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #2D1B4D;
            --lavender: #E6E6FA;
            --pastel-pink: #FFD1DC;
            --soft-blue: #AEC6CF;
            --cream: #FFFDD0;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #1a0f2e;
            color: var(--cream);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- RESTORED WATER SHIMMER LAYER --- */
        .water-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            background: linear-gradient(135deg, var(--deep-purple) 0%, #120a1f 100%);
        }

        .shimmer-effect {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(174, 198, 207, 0.4) 0%, transparent 30%),
                radial-gradient(circle at 70% 20%, rgba(255, 209, 220, 0.3) 0%, transparent 30%),
                radial-gradient(circle at 30% 80%, rgba(230, 230, 250, 0.4) 0%, transparent 30%);
            background-size: 40% 40%;
            filter: blur(45px);
            mix-blend-mode: overlay; 
            animation: water-move 12s ease-in-out infinite alternate;
        }

        @keyframes water-move {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(8%, 8%) scale(1.15) rotate(3deg); }
        }

        header {
            padding: 2.5rem 2rem;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* --- RESTORED PULSING HEADER --- */
        h1 { 
            font-family: 'DotGothic16', sans-serif;
            font-size: 3.2rem; 
            letter-spacing: 6px;
            color: var(--pastel-pink); 
            margin: 0; 
            text-transform: uppercase;
            position: relative;
            text-shadow: 0 0 15px var(--lavender);
            /* This is the pulse you were missing */
            animation: text-flicker 4s infinite; 
        }

        h1::before, h1::after {
            content: "VELVET SHARK STUDIO";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.6;
        }
        
        h1::before { color: #00fff9; z-index: -1; animation: glitch-drift 0.9s infinite alternate-reverse; }
        h1::after { color: #ff00c1; z-index: -1; animation: glitch-drift 1.1s infinite alternate; }

        @keyframes text-flicker {
            0%, 92%, 94%, 99%, 100% { opacity: 1; transform: scale(1); }
            93% { opacity: 0.8; transform: scale(0.99); color: #FF5A2E; }
        }

        @keyframes glitch-drift {
            0% { transform: translate(2px, -1px); clip-path: inset(10% 0 80% 0); }
            20% { transform: translate(-2px, 1px); clip-path: inset(30% 0 20% 0); }
            100% { transform: translate(-1px, -1px); clip-path: inset(0% 0 90% 0); }
        }

        .nav { margin-top: 1.5rem; }
        .nav a { 
            font-family: 'JetBrains Mono', monospace;
            color: var(--cream); text-decoration: none; 
            margin: 0 15px; font-size: 1.1rem; transition: 0.3s;
        }
        .nav a.active { color: var(--pastel-pink); border-bottom: 2px solid var(--pastel-pink); }

        .container { max-width: 900px; margin: 3rem auto; padding: 0 1rem; }

        .blog-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.3s;
        }
        .blog-card:hover { transform: translateX(10px); background: rgba(255,255,255,0.15); }
        
        .date { font-size: 0.8rem; color: var(--soft-blue); font-family: 'JetBrains Mono', monospace; }

        .deco-shark { position: fixed; top: 40%; left: 5%; font-size: 5rem; opacity: 0.08; z-index: -1; }
    </style>
</head>
<body>

    <div class="water-bg">
        <div class="shimmer-effect"></div>
    </div>

    <header>
        <h1>VELVET SHARK STUDIO</h1>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="blog.html" class="active">Blog</a>
            <a href="projects.html">Projects</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </header>

    <div class="container">
        <h2 style="margin-bottom: 25px; color: var(--lavender); font-family: 'JetBrains Mono', monospace;">Latest Writeups 📝</h2>
        
        <div class="blog-card">
            <div>
                <h2 style="margin:0; color: var(--pastel-pink); font-size: 1.25rem;">Voyager: Privilege Escalation</h2>
                <p style="margin:5px 0 0 0; font-size: 0.95rem; opacity: 0.8;">How I exploited a SUID binary to gain root access.</p>
            </div>
            <div class="date">2026-03-24</div>
        </div>

        <div class="blog-card">
            <div>
                <h2 style="margin:0; color: var(--pastel-pink); font-size: 1.25rem;">Analyzing Windows Event Logs</h2>
                <p style="margin:5px 0 0 0; font-size: 0.95rem; opacity: 0.8;">Tracking unauthorized shutdowns in .evtx files.</p>
            </div>
            <div class="date">2026-03-15</div>
        </div>
    </div>

    <div class="deco-shark">🦈</div>

</body>
</html>
