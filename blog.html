<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Velvet Shark Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #2D1B4D;
            --lavender: #E6E6FA;
            --pastel-pink: #FFD1DC;
            --soft-blue: #AEC6CF;
            --cream: #FFFDD0;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--deep-purple), #4B0082);
            color: var(--cream);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- CUTE STUFF: Background Sharks --- */
        body::before {
            content: "🦈";
            position: fixed;
            top: 20%; left: 5%;
            font-size: 5rem;
            opacity: 0.1;
            filter: blur(2px);
            animation: float 6s ease-in-out infinite;
        }

        body::after {
            content: "🫧";
            position: fixed;
            bottom: 10%; right: 10%;
            font-size: 4rem;
            opacity: 0.15;
            animation: float 4s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        header {
            padding: 2rem;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav a { color: var(--cream); text-decoration: none; margin: 0 15px; font-weight: 300; }
        .nav a:hover { color: var(--pastel-pink); text-decoration: underline; }
        .nav a.active {
        color: var(--pastel-pink);
        border-bottom: 2px solid var(--pastel-pink);
        text-shadow: 0 0 10px var(--pastel-pink), 0 0 20px var(--lavender);
        }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }

        /* Blog Post Cards */
        .blog-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .blog-card:hover { background: rgba(255,255,255,0.15); cursor: pointer; }

        .date { font-size: 0.8rem; color: var(--soft-blue); font-family: 'JetBrains Mono'; }
        h2 { margin: 0; color: var(--pastel-pink); font-size: 1.2rem; }

        .nav a { 
        color: var(--cream); 
        text-decoration: none; 
        margin: 0 15px; 
        font-weight: 300; 
        font-size: 0.9rem; 
        transition: 0.3s; 
        }

        /* This makes the tabs glow when you hover over them */
        .nav a:hover { 
        color: var(--pastel-pink); 
        text-shadow: 0 0 10px var(--pastel-pink), 0 0 20px var(--lavender);
        transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <header>
        <h1>VELVET SHARK STUDIO</h1>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="blog.html" class="active">Blog</a>
            <a href="projects.html">Projects</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </header>

    <div class="container">
        <h2 style="margin-bottom: 20px; color: var(--lavender);">Latest Writeups 📝</h2>
        
        <div class="blog-card">
            <div>
                <h2>Voyager: Privilege Escalation</h2>
                <p>How I exploited a SUID binary to gain root access.</p>
            </div>
            <div class="date">2026-03-24</div>
        </div>

        <div class="blog-card">
            <div>
                <h2>Analyzing Windows Event Logs</h2>
                <p>Tracking unauthorized shutdowns in .evtx files.</p>
            </div>
            <div class="date">2026-03-15</div>
        </div>
    </div>

</body>
</html>
