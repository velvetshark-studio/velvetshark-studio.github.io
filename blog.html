<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Velvet Shark Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=DotGothic16&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #2D1B4D;
            --lavender: #E6E6FA;
            --pastel-pink: #FFD1DC;
            --soft-blue: #AEC6CF;
            --cream: #FFFDD0;
            --glass: rgba(255, 255, 255, 0.1);
            --highlight-orange: #FF5A2E;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--deep-purple), #4B0082);
            color: var(--cream);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- BACKGROUND DECORATIONS --- */
        body::before {
            content: "🦈";
            position: fixed;
            top: 40%; left: 5%;
            font-size: 5rem;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
            z-index: -1;
        }

        body::after {
            content: "🫧";
            position: fixed;
            bottom: 5%; right: 5%;
            font-size: 4rem;
            opacity: 0.15;
            animation: float 4s ease-in-out infinite reverse;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        header {
            padding: 2rem;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* --- PIXELATED GLITCH TITLE --- */
        h1 { 
            font-family: 'DotGothic16', sans-serif;
            font-weight: normal;
            font-size: 3.2rem;
            letter-spacing: 6px;
            color: var(--pastel-pink);
            margin: 0 0 1rem 0; 
            text-transform: uppercase;
            position: relative;
            text-shadow: 0 0 15px var(--lavender);
            animation: text-flicker 4s infinite;
        }

        h1::before, h1::after {
            content: "VELVET SHARK STUDIO";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.7;
            filter: blur(0.5px);
        }

        h1::before { color: #00fff9; z-index: -1; animation: glitch-drift 0.9s infinite alternate-reverse; }
        h1::after { color: #ff00c1; z-index: -1; animation: glitch-drift 1.1s infinite alternate; }

        @keyframes text-flicker {
            0%, 92%, 94%, 99%, 100% { opacity: 1; color: var(--pastel-pink); }
            93% { opacity: 0.8; color: var(--highlight-orange); }
        }

        @keyframes glitch-drift {
            0% { transform: translate(2px, -1px); clip-path: inset(10% 0 80% 0); }
            20% { transform: translate(-2px, 1px); clip-path: inset(30% 0 20% 0); }
            40% { transform: translate(1px, -1px); clip-path: inset(50% 0 45% 0); }
            100% { transform: translate(-2px, -1px); clip-path: inset(0% 0 90% 0); }
        }

        /* --- NAVIGATION TABS --- */
        .nav a { 
            font-family: 'JetBrains Mono', monospace;
            color: var(--cream); 
            text-decoration: none; 
            margin: 0 15px; 
            font-weight: 500; 
            font-size: 1.1rem; 
            transition: 0.3s; 
            display: inline-block;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
        }

        .nav a.active {
            color: var(--pastel-pink);
            border-bottom: 2px solid var(--pastel-pink);
            text-shadow: 0 0 10px var(--pastel-pink), 0 0 20px var(--lavender);
        }

        .nav a:hover { 
            color: var(--pastel-pink); 
            text-shadow: 0 0 10px var(--pastel-pink), 0 0 20px var(--lavender);
            transform: translateY(-2px);
        }

        /* --- BLOG SECTION --- */
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }

        .blog-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .blog-card:hover { 
            background: rgba(255,255,255,0.15); 
            cursor: pointer; 
            transform: translateX(10px);
        }

        .blog-card h2 { margin: 0; color: var(--pastel-pink); font-size: 1.2rem; }
        .blog-card p { margin: 5px 0 0 0; font-size: 0.9rem; color: var(--cream); opacity: 0.8; }
        .date { font-size: 0.8rem; color: var(--soft-blue); font-family: 'JetBrains Mono', monospace; }

    </style>
</head>
<body>

    <header>
        <h1>VELVET SHARK STUDIO</h1>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="blog.html" class="active">Blog</a>
            <a href="projects.html">Projects</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </header>

    <div class="container">
        <h2 style="margin-bottom: 20px; color: var(--lavender); font-family: 'JetBrains Mono', monospace;">Latest Writeups 📝</h2>
        
        <div class="blog-card">
            <div>
                <h2>Voyager: Privilege Escalation</h2>
                <p>How I exploited a SUID binary to gain root access.</p>
            </div>
            <div class="date">2026-03-24</div>
        </div>

        <div class="blog-card">
            <div>
                <h2>Analyzing Windows Event Logs</h2>
                <p>Tracking unauthorized shutdowns in .evtx files.</p>
            </div>
            <div class="date">2026-03-15</div>
        </div>
    </div>

</body>
</html>
