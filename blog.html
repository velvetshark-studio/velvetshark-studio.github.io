<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Velvet Shark Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=DotGothic16&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #2D1B4D;
            --lavender: #E6E6FA;
            --pastel-pink: #FFD1DC;
            --soft-blue: #AEC6CF;
            --cream: #FFFDD0;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #1a0f2e;
            color: var(--cream);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- THE WATER CAUSTIC SHIMMER --- */
        .water-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            background: linear-gradient(135deg, var(--deep-purple) 0%, #120a1f 100%);
        }

        .caustics {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(174, 198, 207, 0.35) 0%, transparent 25%),
                radial-gradient(circle at 70% 20%, rgba(255, 209, 220, 0.25) 0%, transparent 25%),
                radial-gradient(circle at 40% 80%, rgba(230, 230, 250, 0.35) 0%, transparent 30%);
            background-size: 40% 40%;
            filter: blur(45px);
            mix-blend-mode: overlay; 
            animation: water-drift 15s ease-in-out infinite alternate;
        }

        @keyframes water-drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 5%) scale(1.1) rotate(2deg); }
        }

        /* --- RESTORED HEADER & PULSE --- */
        header {
            padding: 2.5rem 2rem;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        h1 { 
            font-family: 'DotGothic16', sans-serif;
            font-size: 3.2rem; letter-spacing: 6px;
            color: var(--pastel-pink); margin: 0; 
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--lavender);
            animation: header-pulse 4s infinite ease-in-out; 
        }

        @keyframes header-pulse {
            0%, 100% { opacity: 1; transform: scale(1); filter: brightness(1); }
            50% { opacity: 0.9; transform: scale(1.02); filter: brightness(1.2); }
        }

        .nav { margin-top: 1.5rem; }
        .nav a { 
            font-family: 'JetBrains Mono', monospace;
            color: var(--cream); text-decoration: none; 
            margin: 0 15px; font-size: 1.1rem; transition: 0.3s;
            padding-bottom: 5px; border-bottom: 2px solid transparent;
        }
        .nav a.active { color: var(--pastel-pink); border-bottom-color: var(--pastel-pink); }

        /* --- CONTENT CARDS --- */
        .container { max-width: 900px; margin: 3rem auto; padding: 0 1rem; }

        .blog-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.4s ease;
        }
        .blog-card:hover { transform: translateX(10px); background: rgba(255,255,255,0.15); }
        
        .date { font-size: 0.8rem; color: var(--soft-blue); font-family: 'JetBrains Mono', monospace; }

        /* --- RESTORED EMOJIS & FLOATING --- */
        .deco-shark { 
            position: fixed; top: 45%; left: 5%; font-size: 5rem; 
            opacity: 0.15; z-index: -1; animation: shark-float 8s infinite ease-in-out; 
        }
        .deco-bubbles { 
            position: fixed; bottom: 8%; right: 8%; font-size: 4rem; 
            opacity: 0.2; z-index: -1; animation: bubble-float 6s infinite ease-in-out alternate; 
        }

        @keyframes shark-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }
        @keyframes bubble-float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-20px, -40px) scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="water-layer">
        <div class="caustics"></div>
    </div>

    <header>
        <h1>VELVET SHARK STUDIO</h1>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="blog.html" class="active">Blog</a>
            <a href="projects.html">Projects</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </header>

    <div class="container">
        <h2 style="margin-bottom: 25px; color: var(--lavender); font-family: 'JetBrains Mono', monospace;">Latest Writeups 📝</h2>
        
        <div class="blog-card">
            <div>
                <h2 style="margin:0; color: var(--pastel-pink); font-size: 1.25rem;">Voyager: Privilege Escalation</h2>
                <p style="margin:5px 0 0 0; font-size: 0.95rem; opacity: 0.8;">How I exploited a SUID binary to gain root access.</p>
            </div>
            <div class="date">2026-03-24</div>
        </div>

        <div class="blog-card">
            <div>
                <h2 style="margin:0; color: var(--pastel-pink); font-size: 1.25rem;">Analyzing Windows Event Logs</h2>
                <p style="margin:5px 0 0 0; font-size: 0.95rem; opacity: 0.8;">Tracking unauthorized shutdowns in .evtx files.</p>
            </div>
            <div class="date">2026-03-15</div>
        </div>
    </div>

    <div class="deco-shark">🦈</div>
    <div class="deco-bubbles">🫧</div>

</body>
</html>
