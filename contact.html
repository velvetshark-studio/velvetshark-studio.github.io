<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Velvet Shark Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=DotGothic16&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --deep-purple: #0A0F1E;        /* Ocean Trench Base */
            --lavender: #00FF9F;           /* Bioluminescent Green Glow */
            --pastel-pink: #00E5FF;        /* Electric Teal Title */
            --soft-blue: #0077BE;          
            --cream: #E0F7FA;              
            --glass: rgba(0, 229, 255, 0.05); 
        }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; 
            background: var(--deep-purple); 
            color: var(--cream); min-height: 100vh; display: flex; 
            flex-direction: column; align-items: center; overflow-x: hidden; 
        }

        header { width: 100%; padding: 2rem; text-align: center; background: rgba(10, 15, 30, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 255, 159, 0.1); z-index: 10; }

        /* --- PULSING GLITCH TITLE --- */
        h1 { 
            font-family: 'DotGothic16', sans-serif;
            font-weight: normal;
            font-size: 3.2rem;
            letter-spacing: 6px;
            color: var(--pastel-pink);
            margin: 0 0 1rem 0; 
            text-transform: uppercase;
            position: relative;
            text-shadow: 0 0 15px var(--lavender);
            animation: text-flicker 4s infinite;
        }

        h1::before, h1::after {
            content: "VELVET SHARK STUDIO";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.7;
            filter: blur(0.5px);
        }

        h1::before { color: #00fff9; z-index: -1; animation: glitch-drift 0.9s infinite alternate-reverse; }
        h1::after { color: #ff00c1; z-index: -1; animation: glitch-drift 1.1s infinite alternate; }

        @keyframes text-flicker {
            0%, 92%, 94%, 99%, 100% { opacity: 1; color: var(--pastel-pink); }
            93% { opacity: 0.8; color: var(--lavender); }
        }

        @keyframes glitch-drift {
            0% { transform: translate(2px, -1px); clip-path: inset(10% 0 80% 0); }
            20% { transform: translate(-2px, 1px); clip-path: inset(30% 0 20% 0); }
            40% { transform: translate(1px, -1px); clip-path: inset(50% 0 45% 0); }
            100% { transform: translate(-2px, -1px); clip-path: inset(0% 0 90% 0); }
        }

        /* --- NAVIGATION --- */
        .nav a { 
            font-family: 'JetBrains Mono', monospace;
            color: var(--cream); text-decoration: none; 
            margin: 0 15px; font-weight: 500; font-size: 1.1rem; 
            transition: 0.3s; display: inline-block; padding-bottom: 5px;
        }

        .nav a.active { color: var(--lavender); border-bottom: 2px solid var(--lavender); }
        .nav a:hover { color: var(--pastel-pink); transform: translateY(-2px); }

        /* --- CONTACT CARD --- */
        .contact-card { 
            max-width: 550px; width: 85%; 
            background: var(--glass); backdrop-filter: blur(30px); 
            border-radius: 40px; padding: 4rem 2rem; margin: 3rem 0; 
            border: 1px solid rgba(0, 255, 159, 0.2); text-align: center;
            z-index: 5;
        }

        h2 { font-family: 'Poppins', sans-serif; font-size: 2rem; color: var(--pastel-pink); margin-bottom: 15px; }
        
        .intro-text { font-family: 'Poppins', sans-serif; line-height: 1.6; font-size: 0.95rem; opacity: 0.8; margin-bottom: 40px; }

        .link-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }

        .contact-box {
            background: rgba(0, 255, 159, 0.05);
            padding: 20px; border-radius: 20px; text-decoration: none;
            color: var(--lavender); font-family: 'JetBrains Mono', monospace;
            font-size: 1rem; display: inline-flex; align-items: center; gap: 15px;
            border: 1px solid rgba(0, 255, 159, 0.2); transition: 0.4s;
            width: 100%; justify-content: center;
        }

        .contact-box:hover { 
            background: rgba(0, 255, 159, 0.15); transform: scale(1.03); 
            border-color: var(--lavender); box-shadow: 0 0 15px rgba(0, 255, 159, 0.2);
        }

        /* --- UPDATED OCEAN BACKGROUND GARDEN --- */
        .ocean-bg { 
            position: fixed; 
            z-index: -1; 
            opacity: 0.12; 
            pointer-events: none; 
            user-select: none;
            animation: float 10s infinite ease-in-out; 
        }

        /* Positioning the variety of life */
        .o1 { top: 35%; left: 5%; font-size: 4.5rem; animation-duration: 9s; }  /* Jellyfish */
        .o2 { bottom: 10%; right: 8%; font-size: 5rem; animation-duration: 11s; } /* Coral */
        .o3 { top: 40%; right: 15%; font-size: 3rem; animation-duration: 7s; }  /* Fish */
        .o4 { bottom: 35%; left: 12%; font-size: 3.5rem; animation-duration: 13s; } /* Shell */
        .o5 { top: 60%; left: 4%; font-size: 2.5rem; animation-duration: 8s; opacity: 0.08; } /* Bubbles */
        .o6 { bottom: 5%; left: 30%; font-size: 4rem; animation-duration: 15s; } /* Shark */
        .o7 { top: 25%; right: 30%; font-size: 2rem; animation-duration: 6s; } /* Tropical Fish */
        .o8 { bottom: 45%; right: 5%; font-size: 3.5rem; animation-duration: 10s; } /* Puffer */

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(8deg); }
        }

        /* Subtle Wave Animation for the Water/Seaweed feel */
        @keyframes wave {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(15px); }
        }

        .wave-motion { animation: wave 6s infinite ease-in-out; }
    </style>
</head>
<body>

    <header>
        <h1>VELVET SHARK STUDIO</h1>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="blog.html">Blog</a>
            <a href="projects.html">Projects</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </header>

    <div class="ocean-bg o1">🪼</div>
    <div class="ocean-bg o2 wave-motion">🪸</div>
    <div class="ocean-bg o3">🐠</div>
    <div class="ocean-bg o4">🐚</div>
    <div class="ocean-bg o5">🫧</div>
    <div class="ocean-bg o6">🦈</div>
    <div class="ocean-bg o7">🐟</div>
    <div class="ocean-bg o8">🐡</div>

    <div class="contact-card">
        <h2>Ping the Sharkie 🦈</h2>
        <div class="intro-text">
            Questions, ideas, or just a hello? My inbox is always swimming, and I’d love to see what sharp things we can cook up together.
        </div>
        
        <div class="link-group">
            <a href="mailto:velvetshark.studio@gmail.com" class="contact-box">
                <span>✉️</span> velvetshark.studio@gmail.com
            </a>
            <a href="https://velvetshark-studio.blogspot.com" target="_blank" class="contact-box">
                <span>📝</span> Visit My Sharkie Blog
            </a>
        </div>
    </div>

</body>
</html>
