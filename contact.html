<!DOCTYPE html>

    <style>
        :root { 
            --deep-purple: #3e3452; 
            --bg-bottom: #1e1b29;
            --neon-cyan: #00fff9;
            --cream: #f9f7f2;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(180deg, var(--deep-purple), var(--bg-bottom)); 
            color: var(--cream);
            min-height: 100vh;
        }

        header { padding: 2rem; text-align: center; background: var(--glass); backdrop-filter: blur(10px); }

        h1 { 
            font-family: 'DotGothic16', sans-serif; 
            font-size: 3.2rem; 
            color: var(--neon-cyan); 
            text-shadow: 0 0 12px rgba(0, 255, 249, 0.6);
            margin: 0;
        }

        .nav a { 
            font-family: 'JetBrains Mono', monospace; 
            color: var(--cream); 
            text-decoration: none; 
            margin: 0 15px; 
        }

        .about-card { 
            max-width: 800px; 
            margin: 2rem auto; 
            background: var(--glass); 
            padding: 2rem; 
            border-radius: 25px; 
            text-align: center; 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .skill-badge { 
            display: inline-block; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 4px 12px; 
            border-radius: 15px; 
            margin: 5px; 
            font-size: 0.8rem;
        }
