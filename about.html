<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Velvet Shark Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --deep-purple: #2D1B4D; --lavender: #E6E6FA; --pastel-pink: #FFD1DC; 
            --cream: #FFFDD0; --glass: rgba(255, 255, 255, 0.1); --peach: #FFDAB9; 
        }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, var(--deep-purple), #4B0082); color: var(--cream); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        
        header { width: 100%; padding: 2rem; text-align: center; background: var(--glass); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav a { color: var(--cream); text-decoration: none; margin: 0 15px; font-weight: 300; font-size: 0.9rem; transition: 0.3s; }
        .nav a:hover { color: var(--pastel-pink); text-shadow: 0 0 10px var(--pastel-pink), 0 0 20px var(--lavender); transform: translateY(-2px); }

        /* MAIN CARD */
        .about-card { max-width: 700px; width: 90%; background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px; padding: 3rem; margin-top: 3rem; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        
        /* THE SLOGAN CONTAINER (Acts as the floating boundary) */
        .slogan-container {
            max-width: 650px;
            width: 85%;
            margin-top: 25px;
            background: linear-gradient(135deg, rgba(255, 209, 220, 0.15), rgba(255, 218, 185, 0.15));
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative; /* REQUIRED: For the icons to stay inside */
            overflow: hidden; /* REQUIRED: Extra security - cuts off anything that floats out */
            min-height: 160px; /* Gives the icons room to swim */
            display: flex;
            align-items: center;
            justify-content: center;
            animation: containerFloat 8s infinite ease-in-out;
        }

        .slogan-text {
            color: var(--pastel-pink);
            font-weight: 600;
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.6;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            z-index: 5; /* Puts the text on top of the floating icons */
            position: relative;
        }

        /* --- THE FLOATING VELVET RICE (Aesthetic Icons) --- */
        .floating-icon {
            position: absolute;
            z-index: 1; /* Floats behind the text */
            opacity: 0.2; /* Subtle & "Watermarked" */
            animation: iconFloat 7s infinite ease-in-out;
        }

        /* Icon Details (Vary these for randomness) */
        .icon1 { font-size: 3rem; top: 10px; left: 10px; animation-duration: 9s; color: var(--peach); }
        .icon2 { font-size: 2.2rem; bottom: 15px; right: 20px; animation-duration: 7s; animation-delay: 1s; color: var(--cream); }
        .icon3 { font-size: 1.8rem; top: 50%; left: 15%; animation-duration: 11s; animation-delay: -2s; color: var(--pastel-pink); }
        .icon4 { font-size: 2.8rem; top: 15px; right: 15px; animation-duration: 8s; animation-delay: -3s; color: var(--lavender); }

        /* The Animations */
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-20px) rotate(15deg) scale(1.1); }
        }

        @keyframes containerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .skill-badge { display: inline-block; border: 1px solid var(--lavender); padding: 5px 15px; border-radius: 20px; margin: 5px; font-size: 0.8rem; background: rgba(255,255,255,0.05); }
    </style>
</head>
